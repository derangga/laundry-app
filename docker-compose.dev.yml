services:
  postgres:
    image: postgres:18-alpine
    container_name: laundry_dev_postgres
    environment:
      POSTGRES_USER: ${USER}
      POSTGRES_PASSWORD: postgres_dev_password
      POSTGRES_DB: laundry_app_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${USER}']
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: laundry_dev_prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --enable-feature=remote-write-receiver
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_dev_data:/prometheus
    ports:
      - '9090:9090'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:9090/-/ready || exit 1']
      interval: 5s
      timeout: 3s
      retries: 10

  loki:
    image: grafana/loki:3.3.0
    container_name: laundry_dev_loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_dev_data:/loki
    ports:
      - '3200:3100'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3100/ready || exit 1']
      interval: 5s
      timeout: 3s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    container_name: laundry_dev_otel_collector
    command: --config=/etc/otelcol-contrib/otel-collector.yml
    volumes:
      - ./observability/otel-collector/otel-collector.yml:/etc/otelcol-contrib/otel-collector.yml:ro
    ports:
      - '4317:4317'
      - '4318:4318'
      - '8888:8888'
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.5.0
    container_name: laundry_dev_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./observability/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_dev_data:/var/lib/grafana
    ports:
      - '3001:3000'
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 5s
      timeout: 3s
      retries: 10

  promtail:
    image: grafana/promtail:3.3.0
    container_name: laundry_dev_promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy

volumes:
  postgres_dev_data:
  prometheus_dev_data:
  loki_dev_data:
  grafana_dev_data:
