name: Shared

# Validates all workspace packages under packages/ (shared, api-contract,
# observability). Lint + format checks run from the repo root using the
# root-level tooling; type checks run per-package against each tsconfig.

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - 'feat/**'
      - 'feature/**'
      - 'fix/**'
      - 'refactor/**'
      - 'chore/**'

jobs:
  shared:
    name: Shared
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint check
        run: bun run lint:shared

      - name: Format check
        run: bun run format:check:shared

      - name: Type check
        run: bun run typecheck:shared
