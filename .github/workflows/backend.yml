name: Backend

on:
  pull_request:
    branches:
      - master

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint check
        working-directory: ./backend
        run: bun run lint

      - name: Format check
        working-directory: ./backend
        run: bun run format:check

      - name: Type check
        working-directory: ./backend
        run: bun run typecheck

      - name: Unit tests
        working-directory: ./backend
        run: bun -b run test:run

      - name: Build check
        working-directory: ./backend
        run: bun run build
